<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="catalogo-bg pt-5">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Librería</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalogo.html">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="buscar.html">Buscar</a></li>
                    <li class="nav-item"><a class="nav-link" href="carrito.html">Carrito</a></li>
                    <li class="nav-item"><a class="nav-link" href="sitiomapa.html">Mapa del sitio</a></li>
                    <li class="nav-item">
                    <a class="nav-link" href="login.html">
                        <img src="imagenes/logout1.png" height="20">
                    </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <nav class="breadcrumbs">
        <a href="index.html">Inicio</a>
        <span>›</span>
        <a href="catalogo.html">Libros</a>
        <span>›</span>
        <a href="carrito.html">Carrito</a>
        <span>›</span>
        <span>Pago</span>
    </nav>
    <main class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm p-4">
                    <h2>Resumen de tu pedido</h2>
                    <div id="resumenPedido" class="mb-3"></div>
                    <div id="totalPedido" class="mb-4"></div>
                    <h4 class="mb-3">Datos de pago</h4>
                    <div class="mb-3">
                        <input type="text" id="nombreCliente" class="form-control" placeholder="Nombre completo">
                        <small id="errorNombre" class="text-danger"></small>
                    </div>
                    <div class="mb-3">
                        <input type="text" id="direccionCliente" class="form-control" placeholder="Dirección completa">
                        <small id="errorDireccion" class="text-danger"></small>
                    </div>
                    <div class="mb-3">
                        <input type="text" id="tarjetaCliente" class="form-control" placeholder="Número de tarjeta">
                        <small id="errorTarjeta" class="text-danger"></small>
                    </div>
                    <div class="mb-3">
                        <input type="text" id="cvvCliente" class="form-control" placeholder="CVV">
                        <small id="errorCvv" class="text-danger"></small>
                    </div>
                    <button onclick="realizarCompra()" class="btn btn-warning w-100 fw-bold">Confirmar compra</button>
                </div>
            </div>
        </div>
    </main>
    <div id="pantallaExito" class="pantalla-exito">
      <div class="exito-card">
        <h2>🎉 ¡Compra realizada con éxito!</h2>
        <p id="ordenGenerada"></p> <br>
        <button onclick="cerrarExito()" class="btn btn-primary">
          Volver a la tienda
        </button>
      </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/libros.js"></script>
<script src="js/carrito.js"></script>
</body>
</html>
